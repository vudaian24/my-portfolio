services:
  portfolio_app:
    container_name: portfolio_app
    image: ${DOCKER_HUB_USERNAME}/my-portfolio:latest
    restart: always
    expose:
      - "3000"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    container_name: nginx
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs/cert.pem:/etc/nginx/certs/cert.pem:ro
      - ./nginx/certs/key.pem:/etc/nginx/certs/key.pem:ro
    depends_on:
      - portfolio_app
    networks:
      - app_network

  watchtower:
    container_name: watchtower
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
      - WATCHTOWER_POLL_INTERVAL=60        # check Docker Hub mỗi 60 giây
      - WATCHTOWER_CLEANUP=true            # tự xóa image cũ sau khi update
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_MONITOR_ONLY=false
      - REPO_USER=${DOCKER_HUB_USERNAME}
      - REPO_PASS=${DOCKER_HUB_ACCESS_TOKEN}
    command: portfolio_app                 # chỉ watch container này

networks:
  app_network:
    driver: bridge
