name: CI

on:
  workflow_call:

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Build
        run: yarn build
